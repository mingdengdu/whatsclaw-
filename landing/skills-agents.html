<title>🕵️ Skills 特工 · WhatsClaw</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;
  --border:#30363d;--text:#e6edf3;--muted:#8b949e;--dim:#6e7681;
  --green:#25d366;--green-bg:rgba(37,211,102,.08);--green-border:rgba(37,211,102,.25);
  --yellow:#f0c940;--yellow-bg:rgba(240,201,64,.08);--yellow-border:rgba(240,201,64,.25);
  --red:#f85149;--red-bg:rgba(248,81,73,.08);--red-border:rgba(248,81,73,.25);
  --blue:#58a6ff;--blue-bg:rgba(88,166,255,.08);--blue-border:rgba(88,166,255,.25);
  --purple:#bc8cff;--purple-bg:rgba(188,140,255,.08);--purple-border:rgba(188,140,255,.25);
  --orange:#ffa657;--orange-bg:rgba(255,166,87,.08);--orange-border:rgba(255,166,87,.25);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
a{color:var(--green);text-decoration:none}
a:hover{text-decoration:underline}

/* NAV */
.nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.nav-logo{font-size:17px;font-weight:900;color:var(--text)}
.nav-logo span{color:var(--green)}
.nav-sep{color:var(--border)}
.nav-title{font-size:14px;font-weight:700;color:var(--text)}
.nav-back{margin-left:auto;font-size:13px;color:var(--muted);border:1px solid var(--border);padding:5px 14px;border-radius:6px}
.nav-back:hover{color:var(--text);border-color:var(--green);text-decoration:none}

/* HERO */
.hero{background:linear-gradient(135deg,var(--bg) 0%,var(--bg2) 100%);border-bottom:1px solid var(--border);padding:56px 24px 40px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'🕵️';position:absolute;font-size:240px;opacity:.04;top:-30px;left:50%;transform:translateX(-50%);pointer-events:none}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:var(--purple-bg);border:1px solid var(--purple-border);color:var(--purple);padding:5px 14px;border-radius:100px;font-size:12px;font-weight:700;margin-bottom:20px}
.hero h1{font-size:clamp(26px,4vw,46px);font-weight:900;line-height:1.2;margin-bottom:12px}
.hero h1 span{color:var(--green)}
.hero-sub{font-size:15px;color:var(--muted);max-width:560px;margin:0 auto 28px;line-height:1.7}
.hero-stats{display:flex;justify-content:center;gap:48px;flex-wrap:wrap}
.hero-stat-num{font-size:26px;font-weight:900;color:var(--green)}
.hero-stat-label{font-size:12px;color:var(--dim);margin-top:2px}

/* SEARCH & FILTER */
.toolbar{max-width:1100px;margin:28px auto 0;padding:0 24px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:200px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:9px 14px;font-size:14px;color:var(--text);outline:none}
.search-box:focus{border-color:var(--green)}
.search-box::placeholder{color:var(--dim)}
.filter-group{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;transition:.15s}
.filter-btn.active{background:var(--green);color:#000;border-color:var(--green)}
.filter-btn:hover:not(.active){border-color:var(--green);color:var(--text)}

/* GRID */
.grid{max-width:1100px;margin:20px auto;padding:0 24px 64px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}

/* SKILL CARD */
.skill-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;transition:.2s;position:relative;display:flex;flex-direction:column;gap:0}
.skill-card:hover{border-color:var(--green);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.skill-card.featured{border-color:var(--green-border);background:linear-gradient(135deg,var(--bg2),rgba(37,211,102,.04))}

.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.card-icon{font-size:28px;line-height:1}
.card-badges{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.badge{font-size:10px;padding:2px 8px;border-radius:100px;font-weight:700}
.badge-hot{background:var(--red-bg);border:1px solid var(--red-border);color:var(--red)}
.badge-new{background:var(--blue-bg);border:1px solid var(--blue-border);color:var(--blue)}
.badge-free{background:var(--green-bg);border:1px solid var(--green-border);color:var(--green)}
.badge-pro{background:var(--purple-bg);border:1px solid var(--purple-border);color:var(--purple)}
.badge-official{background:var(--orange-bg);border:1px solid var(--orange-border);color:var(--orange)}

.card-name{font-size:16px;font-weight:800;margin-bottom:5px}
.card-desc{font-size:13px;color:var(--muted);line-height:1.55;margin-bottom:12px;flex:1}
.card-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.card-category{font-size:11px;color:var(--dim);background:var(--bg3);padding:3px 9px;border-radius:6px}
.card-stars{font-size:12px;color:var(--yellow)}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:12px;border-top:1px solid var(--border)}
.card-install{font-family:monospace;font-size:11px;color:var(--green);background:var(--bg3);padding:5px 10px;border-radius:6px;flex:1;margin-right:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-copy{background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:11px;transition:.15s;flex-shrink:0}
.card-copy:hover{border-color:var(--green);color:var(--green)}
.card-copy.copied{border-color:var(--green);color:var(--green);background:var(--green-bg)}

/* SECTION LABEL */
.section-label{max-width:1100px;margin:28px auto 0;padding:0 24px}
.section-label h2{font-size:14px;font-weight:700;color:var(--muted);letter-spacing:.5px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.section-label h2 span{color:var(--green)}

/* COUNT */
.result-count{max-width:1100px;margin:16px auto 0;padding:0 24px;font-size:13px;color:var(--dim)}

/* COFFEE */
.coffee{max-width:560px;margin:0 auto 48px;padding:28px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;text-align:center}
.coffee-btn{display:inline-block;background:#FFDD00;color:#000;font-weight:700;padding:10px 24px;border-radius:8px;font-size:14px;margin-top:14px}
.coffee-btn:hover{background:#ffe833;text-decoration:none}

footer{background:var(--bg2);border-top:1px solid var(--border);padding:20px;text-align:center;color:var(--dim);font-size:12px}

@media(max-width:600px){
  .hero{padding:36px 16px 28px}
  .hero-stats{gap:24px}
  .toolbar{flex-direction:column}
  .search-box{width:100%}
  .grid{grid-template-columns:1fr;padding:0 16px 40px}
}
</style>

let currentCat = 'all';
let searchQuery = '';

function renderSkills() {
  const grid = document.getElementById('skills-grid');
  const countEl = document.getElementById('result-count');
  
  let filtered = skills.filter(s => {
    const matchCat = currentCat === 'all' || s.cat === currentCat;
    const q = searchQuery.toLowerCase();
    const matchSearch = !q || s.name.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q) || (s.tags||[]).some(t=>t.toLowerCase().includes(q));
    return matchCat && matchSearch;
  });
  
  countEl.textContent = filtered.length === skills.length ? 
    `显示全部 ${skills.length} 个 Skills` : 
    `找到 ${filtered.length} 个 Skills`;
  
  grid.innerHTML = filtered.map(s => {
    const stars = '★'.repeat(s.stars) + '☆'.repeat(5-s.stars);
    const badgeHtml = (s.badges||[]).map(b => {
      const map = {hot:'badge-hot',new:'badge-new',free:'badge-free',pro:'badge-pro',official:'badge-official',tencent:'badge-official'};
      const labels = {hot:'🔥 热门',new:'✨ 新上',free:'🆓 免费',pro:'⚡ Pro',official:'🏢 官方',tencent:'🐧 内网'};
      return `<span class="badge ${map[b]||''}">${labels[b]||b}</span>`;
    }).join('');
    const featured = s.badges&&(s.badges.includes('hot')||s.stars===5) ? ' featured' : '';
    const tagHtml = (s.tags||[]).map(t=>`<span style="font-size:10px;color:var(--dim);background:var(--bg3);padding:2px 7px;border-radius:4px;margin-right:4px">${t}</span>`).join('');
    return `
    <div class="skill-card${featured}">
      <div class="card-top">
        <div class="card-icon">${s.icon}</div>
        <div class="card-badges">${badgeHtml}</div>
      </div>
      <div class="card-name">${s.name}</div>
      <div class="card-meta">
        <div class="card-stars">${stars}</div>
        <div>${tagHtml}</div>
      </div>
      <div class="card-desc">${s.desc}</div>
      <div class="card-footer">
        <div class="card-install">${s.install}</div>
        <button class="card-copy" onclick="copyInstall(this,'${s.install.replace(/'/g,"\\'")}')">复制</button>
      </div>
    </div>`;
  }).join('');
}

function copyInstall(btn, cmd) {
  if(cmd === '内置 Skill'){
    btn.textContent = '内置';
    setTimeout(()=>btn.textContent='复制',1500);
    return;
  }
  navigator.clipboard.writeText(cmd).then(()=>{
    btn.textContent='✓ 已复制';
    btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='复制';btn.classList.remove('copied')},1500);
  });
}

document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    renderSkills();
  });
});

document.getElementById('search').addEventListener('input', e=>{
  searchQuery = e.target.value;
  renderSkills();
});

renderSkills();
</script>
</body>
</html>
