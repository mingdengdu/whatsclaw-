<!-- 微信支付弹窗 HTML 片段（插入到 body 末尾）-->
<div id="wc-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:20px;padding:32px;text-align:center;max-width:320px;width:90%;position:relative">
    <button onclick="closeWC()" style="position:absolute;top:12px;right:16px;background:none;border:none;font-size:22px;cursor:pointer;color:#999">✕</button>
    <div style="background:#07C160;color:#fff;border-radius:10px;padding:12px 0 8px;margin-bottom:16px">
      <div style="font-size:13px;margin-bottom:4px">歡迎使用 WeChat Pay HK</div>
      <div id="wc-amount" style="font-size:28px;font-weight:900">HK$210</div>
      <div style="font-size:11px;opacity:0.8;margin-top:2px" id="wc-plan-label">Starter · 月付</div>
    </div>
    <img id="wc-qr" src="" style="width:200px;height:200px;border-radius:8px;border:1px solid #eee" alt="WeChat Pay QR">
    <div style="margin-top:12px;font-size:13px;color:#333;font-weight:600">Marty Du</div>
    <div style="margin-top:8px;font-size:12px;color:#999">扫码后请备注：套餐名称 + 你的邮箱</div>
    <div style="margin-top:4px;font-size:12px;color:#999">付款后 24 小时内开通</div>
  </div>
</div>

<script>
// 把你的微信收款码图片的 URL 或 base64 填在这里
// 暂时用占位图，你把真实收款码图片传上来后替换
var WC_QR_URL = '/images/wechat-qr.png';

var plans = {
  starter:    { amount: 'HK$210', label: 'Starter · 月付 ($29/mo)' },
  growth:     { amount: 'HK$580', label: 'Growth · 月付 ($79/mo)' },
  enterprise: { amount: 'HK$1,450', label: 'Enterprise · 月付 ($199/mo)' },
};

function openWC(plan) {
  var p = plans[plan] || plans.starter;
  document.getElementById('wc-amount').textContent = p.amount;
  document.getElementById('wc-plan-label').textContent = p.label;
  document.getElementById('wc-qr').src = WC_QR_URL;
  var m = document.getElementById('wc-modal');
  m.style.display = 'flex';
}

function closeWC() {
  document.getElementById('wc-modal').style.display = 'none';
}

// 点击遮罩关闭
document.getElementById('wc-modal').addEventListener('click', function(e) {
  if (e.target === this) closeWC();
});
</script>
